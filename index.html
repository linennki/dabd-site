<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DABD 仏典音義データベース</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
header{background:#fff;padding:15px;border-bottom:1px solid #ddd}
h1{margin:0;font-size:20px}
main{max-width:1000px;margin:20px auto;padding:10px}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
table{width:100%;border-collapse:collapse;margin-top:15px;background:#fff}
th,td{border-bottom:1px solid #ddd;padding:8px;text-align:left}
th{background:#fafafa}
</style>
</head>

<body>

<header>
<h1>仏典音義データベース（DABD）</h1>
</header>

<main>

<input id="search" placeholder="キーワード検索（見出し語・注釈など）">

<table>
<thead>
<tr>
<th>見出し語</th>
<th>声点</th>
<th>注釈</th>
<th>出典</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</main>

<script>
let DATA = [];

fetch('data.json')
.then(r=>r.json())
.then(d=>{
  DATA=d;
  render(DATA);
});

function render(rows){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=rows.map(r=>`
    <tr>
      <td>${r.見出し語}</td>
      <td>${r.声点}</td>
      <td>${r.注釈}</td>
      <td>${r.出典}</td>
    </tr>
  `).join('');
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  const filtered=DATA.filter(r=>
    Object.values(r).join('').toLowerCase().includes(q)
  );
  render(filtered);
});
</script>

</body>
</html>
